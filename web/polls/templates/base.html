<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ECG Study — Uppsala University{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cream: #F7F4EE;
            --ink: #1A1916;
            --ink-muted: #6B6860;
            --ink-faint: #B8B5AE;
            --accent: #2A4A6B;
            --accent-light: #E8EFF6;
            --rule: #D9D5CC;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Crimson Pro', Georgia, serif;
            background-color: var(--cream);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-rule {
            width: 100%;
            height: 3px;
            background: var(--accent);
            flex-shrink: 0;
        }

        header {
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid var(--rule);
            flex-shrink: 0;
        }

        .university-mark {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 0.12em;
            color: var(--ink-muted);
            text-transform: uppercase;
        }

        .study-id {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--ink-faint);
            letter-spacing: 0.06em;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            width: 100%;
        }

        footer {
            padding: 1.75rem 3rem;
            border-top: 0.5px solid var(--rule);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
        }

        .footer-text {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 0.08em;
            color: var(--ink-faint);
        }

        {% block extra_styles %}{% endblock %}
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

<div class="top-rule"></div>

<header>
    <span class="university-mark">Uppsala University &mdash; MSc in Data Science</span>
    <span class="study-id">Alberto Comesaña</span>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <span class="footer-text">&copy; 2025 Uppsala University</span>
    <span class="footer-text">All responses are anonymous and used solely for academic research.</span>
</footer>

</body>
</html>
