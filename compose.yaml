# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "app".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  nginx:
    build:
      context: ./nginx
    ports:
      - 80:80
    volumes:
      - static_volume:/static # read static files from the shared volume with the webapp
    depends_on:
      - web

  api:
    build:
      context: ./api
    # If your application exposes a port, uncomment the following lines and change
    # the port numbers as needed. The first number is the host port and the second
    # is the port inside the container.
    expose:
      - 8000

    # The commented out section below is an example of how to define a PostgreSQL
    # database that your application can use. `depends_on` tells Docker Compose to
    # start the database before your application. The `db-data` volume persists the
    # database data between container restarts. The `db-password` secret is used
    # to set the database password. You must create `db/password.txt` and add
    # a password of your choosing to it before running `docker compose up`.
  
  web:
    build:
      context: ./web
    depends_on:
      db:
        condition: service_healthy
    expose:
      - 8080 # only reachable from the docker network
    env_file:
      - .env
    develop:
      watch:
        - action: sync
          path: ./web
          target: /app
        - action: rebuild
          path: ./web/requirements.txt
    volumes:
      - ./web:/app
      - static_volume:/app/staticfiles
      - ./nstemi_omi:/app/nstemi_omi

  db:
    image: postgres:17.9
    restart: always # automatically restart database on crash
    user: postgres # use bultin postgres user instead of root
    ports:
      - 5432:5432 # export postgres default port to the host machine
    volumes:
      # mount the db-data volume to the /var/lib/postgresql/data directory
      # in the container ensuring that the data lives outside the container
      - db-data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
  static_volume: